body:
  text: 金華子雜編卷上南唐劉崇逺撰我唐烈祖髙皇帝睿哲神明順天膺運相羿禍浹有仍之慶始隆哀莽毒飫銅馬之尊是顯堯儲復正文廟重新漉沉海之斷綸却成萬目撥伏灰之餘簡在序九流宗周而一仁風依漢而雜霸道澆漓頓革習尚無虛遂使武必韜鈐不空弓馬文先政理乃播風騷由是勳代子孫知弓裘之可重閭閻童稚識詩書之有望不有所廢其何以興是知楊氏飭弊於前乃自弊也烈祖聿興於後固天興乎始天祐間江表多故洎及寧貼人尚茍安稽古之談幾乎絶侣橫經之席蔑耳無聞及髙皇初收金陵首興遺教懸金為購墳典職吏而寫史籍聞有藏書者雖寒賤必優詞以假之或有贄獻者雖淺近必豐厚以答之時有以學王右軍書一軸來獻因償十餘萬繒帛副焉由是六經臻備諸史條集古書名畫輻湊絳帷俊傑通儒不逺千里而家至户到咸慕置書經籍道開文武並駕暨升元受命王業赫然稱明文武莫我跂及豈不以經營之大其有素乎王師範鎮青州以其祖父版籍舊地凡本縣令新到必備儀注躬往投刺縣令畏懼出迎不許之師範令二三客將挾縣令坐于㕔上命執事通曰百姓節度使王某參拜于庭中而出縣令惶惑步隨至府謝罪加遜而遣之從事多諫其非宜請不行師範曰以某之見則不然將所以荷國恩而敬念先世示子孫不忘于本故爾師範器宇英俊短于寬恕殺戮過差人知其必敗或曰能用禮以正身丈夫順而舉事翻結仇釁禍不旋踵其故何哉金華子曰昔劉越石非不欲立殊勳于世而十萬之衆曽不假息誠統之非才然亦時運不可干也時梁氏方熾謂九􅀢在己之掌握天王窮迫痛宰輔誅戮于道路師範適當依附于勤王誠宜鼓扇恩信完結民力寬而有衆才可合順而専任威刑輕視民命以一州之地敵干鼎之豪縱殺戮之心救崩潰之勢抱薪撲燎其可得乎陸翺字楚臣進士擢第詩不甚髙而才調宛麗有子弟之標格未成名時甚貧素其間居即事云衰桞欹間苑白門啼暮鴉茅厨煙不動書牖日空斜老憶東山石貧看南阮家沉憂損神慮萱草自開花宴趙氏北樓云殷勤趙公子良夜竟相留明月生東海仙娥在北樓酒闌珠露滴歌迥石城秋本為愁人設愁人到曉愁題品物類亦綺美鸚鵡早鶯栁絮燕子當時甚播於人口及第纍年無人召一逰東諸侯獲鏹僅百萬而已竟無所成卒于江南長子希聲好學多藝勤于讀史非寢食未嘗釋卷中朝諸侯之子弟好讀史者無及希聲昭宗朝登庸辭疾不就出逰江外獲全危難段郎中成式博學精敏文章冠於一時著書甚衆酉陽雜俎最𫝊於世牧廬陵日常逰山寺讀一碑文不識其間兩字謂賔客曰此碑無用于世矣成式讀之不過更何用乎客有以此兩字遍咨字學之衆實無有識者方驗郎中之奧古絶倫焉連牧江南名山九江匡廬縉雲爛柯廬陵麻姑皆有吟詠前進士許棠寄詩云十三年領郡郡郡𬋩仙山為廬陵頑民妄欣逾年方明其清白退隱於峴山時溫博士庭筠方謫尉隨縣廉帥徐太師商留為從事與成式甚相善以其古學相遇常送墨一鋌與飛卿往復致謝遞搜故事者九函在禁集中為其子安節娶飛卿女安節仕至吏部郎中沂王𫝊善音律著樂府新行于世崔㳙在杭州其俗端午習競渡於錢塘湖每先數日即於湖沜排列舟舸結絡綵檻東西延袤皆髙數丈為湖亭之軒飾忽於其夕北風暴作綵船洶湧勢莫可制既明皆逐風飄泊處湖之南岸執事者相顧莫知為計須臾㳙與官吏到湖亭見其陳設皆遙指於層波之外大將愧懼以綵艦聨從非人力堪制無計取回㳙微笑曰競渡船共有多少令每一綵舫繫以三五隻船齊力一時鼓棹倐忽而至殊不為難觀者歎駭服其權智㳙之機捷率多如此崔㳙大夫璵之子小宗伯淡之兄㳙性俊逸健於記識初與杭州上事數日喚都押衙謂曰乍到郡中未能憶諸走吏名姓卒要呼喚皆滯人頤指居常當直將卒都有幾人對曰在衙當直都有三百人乃各令以紙一幅大書姓名貼于胸襟前逐人㸃過自此一閲逮及三考未常誤喚一人者栁氏舊聞唐宰相李德裕所著也德裕以上元中史臣栁芳得罪黔中時髙力士亦徙巫州因相與周旋力士以芳嘗司史為芳言先時禁中事皆所不能知而芳亦以質疑者默識之次其事號問髙力士上令採訪故史氏取其書今按其書已失不獲德裕之父與芳子吏部郎中冕貞元初俱為尚書郎後謫官俱車出道相與語遂及髙力士之說乃編此為次栁氏舊聞以備史官之說也宣宗已後近代宰相堂判俊贍無及路公巖者杜尚書惂邠公之弟牧泗州為龐勛所圍以孤城保全於巨賊之中髙錫望牧滁州嬰城固守而死巖判崔雍狀引二子以證其事云錫望守城而死已有追崇杜惂孤壘獲全尋加殊奬杜邠公悰暮年耽於燕㑹淮海之政有獄市之譽聞于上聽因除崔魏公鉉替悰上賦長韻詩送鉉其落句云今遣股肱親養治一方獄市獲來蘇淮南左都押衙傅希才聞御製因習來蘇隊舞以迎候邠公恱之公自廣陵致仕東洛揚州軍將因入奏經洛中以故吏參焉公問曰來蘇健否軍將不敢對公曰傅希才也對曰健故事南曺郎既聞除目如偶然忽變改授他人縱未領命亦不復還省矣南海端揆為主客貟外時有除翰林學士之命既省吏忽報除目下貟外徐彥若除翰林學士端揆以己未承㫖乃駕而將復治故㕔至省省門子前曰貟外已受報出省不可更入南曺例舉不敢避遂退彥若公相之子能馳譽清顯中尉楊復恭善之故能變致中授耳令狐公綯文公之子也自翰林入相最承恩渥先是上親握庶政之後即詔諸郡刺史秩滿不得赴别郡須歸闕朝對後方許之任綯以隨房鄰州許其便即之任上覽謝表因問綯曰此人緣何得便之任對曰緣地近授守庶其便于迎送上曰朕以比來二千石多因循官業莫念治民故令其到京親問所施設理道優劣國家將在明行升黜以蘇我赤子耳德音即行豈又逾越宰相可謂有權綯嘗以過承恩顧故擅移授及聞上言時方嚴凝而流汗浹洽重裘皆透令狐補闕滈與弟中書舍人澄皆有才藻令狐之文彩世有稱焉自楚及澄三代皆擅美于紫薇崔㳙弟淡容止清秀擢第纍登朝列崔魏公辟為從事清瘦明白猶若鷺絲古之所謂玉而冠者不妄也先是中朝流品相率為朋甲以名德清重之最者為其首咸通之際推李公都為大龍甲頭沙汰名士以經緯其伍㳙淡親昆仲也淡即預于品目以㳙之俊逸目為麁率不許齒焉多方敬接冀時昵附而甲中之士恭默莫肯應對避之如蠆螫焉崔起居雍甲族之子少髙令聞舉進士擢第之後藹然清名喧于時與鄭皓同為流品所重舉子入事得逰歷其門館者則登第必然矣時人相語為崔鄭世界雖古之龍門莫之加也故池州李常侍寬桂林大父即常侍之兄同營别墅于金陵甲第之盛冠于邑下人皆號為土墻李家宅宣宗嘗親試神童李㲄于便殿㲄年數嵗聰慧詳敏對問機悟上甚恱之因賜解褐官絹二匹香一合子以彰異渥上之儉德皆此類也宣宗臨御逾于一紀而憂勤之道始終一致但天下雖寧水旱間有大中之間越洪潭青廣等道翻城以上之恭儉明德時無異心方隅諸將雖失統御而恩詔慰撫不日安輯輿論謂上為小太宗王尚書式僕射起之子朝廷儒宗最見重于武宗常自舉于上曰讀書則五行皆下為文則七步成章而式頗有武幹善用兵纍總戎平裘甫等溫璋失利於徐州朝廷以彭門頻年逐帥乃自河陽移式領河陽全軍赴任焉駐軍境外優遊緩進徐州將士王智興矯矯難制其銀刀教都子父軍相承每日三百人守衙皆露刃坐于兩廊夾幕之下稍不如意相顧笑議于飲食間一夫號呼衆卒率和節使多儒素懦怯聞亂則後門逃遁而獲免焉如是逮有年矣暨聞式到近境先遣衙隊三百人逺接式衩衣坐胡床受參既畢乃問其逐帥之罪命皆斬于帳前不留一人崔魏公鎮淮海九載法令一設無復更改出入嚴整未嘗輕易儀注常列引馬軍將少亦不下二百蹄民康俗阜軍府晏然天祐末故老猶存喜論其餘愛或戲之為九年老崔雍為起居郎出守和州遇龐勛悖亂賊兵攻和雍棄城奔浙右為路巖所搆竟坐此見害雍與兄朗序福昆仲八人皆升籍進士列甲乙科嘗號為㸃頭崔家始雍之擢第也其伯父昆仲率賀㑹飲中堂既醉而寢忽夢逰歷于公署間有緑衣者命坐于㕔事中設酒饌甚備既而醉飽不堪承命其人堅請不已雍乃請曰願以此肉召從人盡之緑衣曰不可須先輩自盡既寤甚惡之及和州失律投于連帥裴公璩奏之鎖縻于思過院雍憂恚且悶乃召獄直軍將話其事不日𠡠至果如夢焉後周侍中寶之在軍困于芻粟之備有僕忘其姓名恆力負至不令有乏如是綿歷星紀未嘗辭倦及其達也舉之𨽻諸衛使主廄庾以謹厚尤見委任既卒數年矣或一夕夢來報馬料盡公甲午生甚惡之遂病痁而薨李景讓尚書少孤尊夫人某氏性嚴重明斷近代貴侯母氏之賢無及之也孀居東雒諸子尚幼家本清素日用尤乏適值霖雨且久其宅院古墻夜坍隤童僕修築次忽見一船槽實以散錢婢僕等當困窶之際喜其有獲相率奔告于堂上太夫人聞之誡童僕曰切未得輒取候吾來視之而後發既到命取酒酹之曰吾聞不勤而獲祿猶為身災士君子所慎者非義之得也我非堪焉若天實以先君餘慶憫及未亡人當令此諸孤學問成立他日為俸錢門下此未敢覿乃令函閉如故其後諸子景讓景溫景莊皆進士擢第並有重名位至方嶽景讓最剛正奏彈無所避為御史大夫宰相宅有看街樓子皆幛之懼其糾劾也然終以強毅為時所忌舊俗除亞相者百日內若别有人登庸謂之辱臺而景讓未十旬蔣公伸入相景讓除西川節度赴鎮不逾年乃請老歸于洛下終身不復再起太夫人孀居之嵗才未中年貞幹嚴肅姻族敬憚訓厲諸子言動以禮雖及官逹之後稍怠于辭㫖則檟楚無捨先是景讓除浙西節度使已而忽問曰取何日進發偶然忘思慮便云擬取某日太夫人曰若此日吾或有事去未得如何景讓惶懼方悟失對太夫人曰官職貴逹不用老母得也命童僕折去巾綬撻于堂下景讓時以班白而髙堂嚴厲常若履氷搢紳之流健羡莫及其後在浙西日左都押衙因應對乖禮怒撻而斃之既而三軍洶洶將致翻城太夫人乃候其受衙之際出坐㕔中叱景讓立于階下曰天子以方嶽命汝鎮撫安得輕弄刑政茍致一方非寧不唯上負聖君而令垂暮老母銜羞而死且使老婦何面目見汝先大夫于地下言切語正左右感咽乃命坐于庭中將撻其背賔僚將校畢至拜泣乞之移時不許大將以下嗚咽感謝之于是軍伍帖然無復異議矣景莊纍舉未捷太夫人聞其㸃額即笞其兄中表皆勸如是纍嵗連受庭責終不薦託親知切請之則曰朝廷知是李景讓弟非是冒取一名者自合放及第乎既而宰相果謂春官曰今年李景莊須放及第可憫那老兒一年邅一頓杖是嵗景莊登第矣李趙公紳再鎮廣陵竇傪猶幕江淮傪永貞二年相公權德輿門生洎武宗朝踰四十載趙國雖事威嚴亦以傪宿老敬之傪列筵以迎府公公不拒焉既而出家樂侑之伶人趙萬金前獻口號以譏之曰相公經文復經武常侍好今又好古昔日曽聞阿舞婆如今親見阿婆舞趙公囅然久之杜審權以廟堂出鎮浙西清重恭寬雖左右僮僕稀見其語在翰苑最久常侍從親密性習慎厚故也在鎮三載自初上任坐于東㕔洎于罷去未嘗他處雖重臣經歷亦不踰中門雍容之度丹青莫及時邠公先逹人謂之老杜相公審權人謂之小杜相公也王尚書式初為京兆少尹好縱情酣飲京城號為王鄧子性復放率不拘小節長安坊巷中有欄街鋪設中夜樂神遲明未已式因過之駐馬寓目舞者喜賀主人持杯跪獻于馬前曰主人多福感得逹官來顧味稍美敢拜夀觴式笑取而飲愧領而去行百餘步乃回轡復詣之曰向者酒甚不惡可更一杯復據鞍引滿巨鍾而去其放率多如此髙燕公駢雲南之功聞于四海晚節妖亂嗤笑婢子之口嗚呼怒鄰不義幸灾不仁亡不旋踵已則甚之雖自取也然若有天道豈不足以垂戒乎周侍中寶與髙中令駢起家神䇿打毬軍將而擊拂之妙天下知名李相國公領鹽鐵在江南駐泊潤州萬花樓觀春時酒樂方作乃使人傳語曰在京國久聞相公打毬盛名如何得一見寶乃輟樂命馬不換公服馳驟于綵場中都憑城樓下瞰見其懷挾星彈揮擊應手稱嘆者久之曰若今日之所覩即從來之聞猶未盡此之善也周侍中寶初在軍中性强毅閹官之門莫肯屈節逮將中年猶處下位或自憤悱獨以領毬子供奉者前後凡三十六度遂挂聖意遷金吾第二番將軍尋遷對御仗第一籌喪其一目授涇原節度移鎮浙東與燕公對境髙駢在軍中時以兄呼寶及總元戎意遂輕少兼以對境微釁憎愛日尋漸積為仇讎矣韓藩端公大中二年封僕射敖門生也與崔瑄大夫同年而相善瑄廉問宛陵請藩為副使時幕府諸從事率多後進子弟以藩年齒髙暮凡逰從觀㑹莫肯從押藩不平之一日諸郎府移厨看花而藩為之幕長方盛服㕔中俟其來報移時莫之召藩乃入謁瑄見藩至甚訝其不赴㑹藩但言不知瑄乃與藩携手往焉既至彼瑄則讓其失禮于首㕔賔從初端揖悚聽俄而判官孔振攘袂厲聲曰韓三十五老大漢向同年覔得一副使而更學鬬唇合舌瑄掀髯而起饌席遂散李瞻王祝繼牧常州皆以名重朝廷于本道不修支郡禮初李給事多不順從亷使猶剛正於可否其王給事則強愎為己任周侍中寶皆隱忍之瞻罷秩退隱茅山則免黃巢之難祝剛訐北土遂罹王珙之害金華子曰禍福無門惟人所召誠不謬乎生附子之毒能殺人人固知之矣而醫工或勸人服者唯生黑豆和合可以紓患句屈茅山出烏頭道流水煮為丸餉遺知聞愚頻見服者踰月而後毒作則痰吐昏迷亟療方止愚外表老丈中與韓端公是舅甥者云目見藩自宣州罷職退居于鍾山愛敬寺忽有道流勸服補益藥以生附子數兩以硫黃為丸藩服之數月乃方似覺有力常日數服忽一日鼻出鮮血頃之耳目口鼻百毛穴中一齊流血莫可制之藩身貌瓌偉既疲委頓簟席流液須臾侍疾骨肉鞋襪皆如緋染自辰及巳午唯皮骨存焉洗澤莫及但以血肉舉骨就木而已金華子曰吁不知附子之毒遽若此之甚也豈韓公運數㑹于此也禮云醫不三世不服其藥以斯而言可以明君子進藥之審也夫肉麵養身之恆物也冷暖茍差猶能灾人而况金石靈草者藴粹精之神明儻非九轉之制孰可輕脫駕馭乎處天地間飛動微物盡能顧惜身命况于達明之士也何乃茍利從欲劫掠為功由彼兵火自貽不戢之禍冀無自焚也不亦逺乎王昭輔嘗話故鍾陵平江西時有一王處士善筮自云授易于至人纎巨如見鍾陵幕中有楊推官常因休假㑹同人小飲時賔客未齊間且于小㕔奕碁握槊以佇俱至俄而主人忽南向瞪視神色沮喪遽歸堂前使人𫝊語賔客託以不安且罷此㑹于是諸客皆散昭輔方舉進士亦在坐中使人獨命入謂曰聞秀才與王處士有宗盟分今欲奉凂持一金往請卜一卦可乎王遂函金往遇之既布卦曰卦甚異可速報之寃家亟來索七日當至宜决行計問宜禳禱乎曰至寃得請于天命詎可改乎昭輔復命時楊方危坐以俟其返既聞所筮乃曰斯人信名卜矣問昭輔曰向來覺辭色改常否曰衆皆覩之楊乃自述十五年前髙燕公在淮南日任江揚宰有弟收拾一風聲婦人為歌姬在舍一旦方治晨妝為諸女姊驕族來惱其嫂甚怒逼逐之出于中門其旦某入府遇放衙歸早忽見不衣裙獨在中門外疑忌其素非廉人時弟又不在大怒之責其㸃汚家風遽索杖背笞之二十家人急以藥物躡灌之沉悶不蘇經中夕而死爾後絶無影響適來忽見躡履自南廊縱步而前刻期曰我上訴于天已得伸雪七日內當來取爾命矣此固無可奈何然驗王生之卜於前事不誣果七日而卒杜紫薇牧位終中書舍人自作墓志云平生好讀書為人亦不出人曺公曰吾讀兵書戰䇿孫武深矣因注其書十三篇可為上窮天時下極人事無以加也後當有知之者矣典吳興日夢人告之曰爾當位至郎中復問其次曰禮部再問曰中書舍人終於典郡耳又夜寢不寐有人即告曰爾改名畢又夢書片紙皎皎白駒在彼空谷傍有人曰非空谷也過隙也逾月而卒臨終留詩誨其二子曹師晦辭抳抳德祥等云萬物有好醜各以姿狀論唯人則不爾不學與學論學非採其花要自撥其根孝友與誠實而不妄爾言根本既深實柯葉自滋繁念爾無忽此期以慶吾門晦辭終淮南節度判官德祥昭宗朝為禮部侍郎知貢舉甚有聲望杜晦辭牧之子自南曺郎為趙公隱從事于西方王郢之叛趙相國以撫御失宜致仕晦辭罷職時北門李相國在淮南辟為判官晦辭以恩門休戚辭不受命退隱于陽羡别業時論多之永寧劉相國鎮淮南又辟為節度判官始方應召狂于美色有父遺風赴淮南之召路經常州李瞻給事方為郡守晦辭于祖席忽顧營妓朱娘言别掩袂大哭瞻曰此風聲婦人貟外如要但言之何用形迹乃以步軍隨而遺之晦辭自飲筵散不及換衣步歸舟中以告其內內子性仁和聞之無難色遂輦而迎之其喜于適願也如是金華子雜編卷上
