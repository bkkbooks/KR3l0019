body:
  text: 金華子雜編巻下南唐劉崇逺撰琅邪王氏與太原出于周琅邪之族世嘗有錐頭之名今太原王氏子弟多事爭炫稱是己族其實非也太原貴盛之中自有鈒鏤之號而崔氏博陵與清河亦上下其望族博陵三房大房第二房雖長今其子孫即皆拜三房子弟為伯叔者蓋第三房婚嫁多逹官也姑臧李氏亦然其第三房皆倨受大房二房之禮清河崔氏亦小房最專清羙之稱崔程即清河小房世居楚州寳應縣號八寳崔家寳應本安宜縣崔氏曽取八寳以獻勅改名焉程之姊北門李相國蔚之夫人蔚乃姑臧小房也判鹽鐵程為揚州院官舉吴堯卿巧于圖利一時之便蔚以為得人竟亂筦𣙜之政程累牧數郡皆無政聲小杜相公聞程諸女有容德致書為其子譲能取焉初辭之私謂人曰崔氏之門若一杜郎其何堪矣而相國堅請不已程不能免乃于寳應諸院間取一弟姪以應命而適之其後譲能顯逹封國夫人而程之女竟無聞焉蔡州伯父院諸兄皆少孤洎南海子長擢第之日伯母安定胡氏已尊年矣詰旦僮僕㨗至穆氏長阿姨入賀北堂伯母方起未離寢榻問安之後慮驚尊情不敢遽聞但嬉笑于前久之忽問曰小娘今日何喜色之甚也對曰亦只縁有事甚喜伯母怡然久之曰我知也是郎將及第耶言訖滿目泫然左右因之不覺皆流涕吁長仁之念周而永慕之情至誠非淳摰也不能感物李郢詩調羙麗亦有子弟標格鄭尚書顥門生也居于杭州踈于馳競終于員外郎初將赴舉聞隣氏女有容德求娶之遇同人爭娶之女家無以為辭乃曰備一千緡先到即許之兩家具錢同日皆往復曰請各賦一篇以定勝負負者乃甘退女竟適郢初及第囘江南經蘇州過親知方作牧邀同赴茶山郢辭以决意春歸為妻作生日親知不放與之胡琴焦桐方物等令且寄代歸意郢為寄内曰謝家生日好風煙柳暖花香二月天金鳳對翹雙翡翠蜀琴新上七絲絃鴛鴦交頸期千載琴瑟諧和願百年應恨客程歸未得緑窻紅淚冷涓涓兄子咸通初來牧餘杭郢時入訪猶子留宿虛白堂云闕月斜明虛白堂寒蛩唧唧樹蒼蒼江風徹曙不得睡二十五聲秋㸃長張祜詩名聞于海外居潤州之丹陽嘗作俠客𫝊盖祜得隱俠術所以託詞自叙也崇逺猶憶往歲赴恩門請承乏丹陽因得追尋往跡而祜之故居垝垣廢址依然東郭長河之隅常訊于廬里則亂前故老猶存頗能記憶舊事說祜之行止亦不異從前所聞問其隱俠則云不覩他異唯邑人往售物于府城每抵晚歸時猶見祜巾褐杖履相翫酒市巳則勁歩出郭夜迴縣下及過祜門則又已先歸矣如此恒常不以為怪從縣至府七十里其迢逓而躡履速人莫測焉韋楚老少有詩名相國李公宗閔之門生也自左拾遺辭官東歸寄居金陵常跨驢䇿杖經市中過布袍貌古羣稚随而笑之即以杖指畫厲聲曰上不屬天下不屬地中不累人可畏韋楚老引羣兒令笑因吟詠而去徐太尉彦若之赴東南將渡小海親随軍將息忽于淺瀬中得一小琉璃瓶子大如嬰児之拳其内有一小龜子可長一寸許旋轉其間略無暫已瓶口極小不知所入之由也因取而蔵之其夕忽覺船一舷壓重及曉視之即有衆龜層疊乗船而上大懼以其將渉海慮蹈不虞因取所蔵之瓶子祝而投于海中龜遂散既而話于海舶之胡人胡人曰此所謂龜寳也希世之靈物惜其遇而不能得蓋薄福之人不勝也茍或得而蔵于家何慮寳蔵之不豐哉胡客歎惋不已淮南巨鎮之最人物富庻凡所製作率皆精巧樂部俳優尤有機㨗者雖魏公德重搢紳觀其諧謔亦頗為之開頤嘗行讌之暇與國夫人盧氏偶坐于堂公忽微笑不已夫人訝而訊之公曰此中有樂人子孫多出言吐氣甚令人笑夫人承命軸簾召之孫子既至撫掌大笑而言曰夫妻兩個更不著别人風貌閑雅舉止可笑參拜引辟獻詞敏悟夫人稱善因厚賜之王師範性甚孝友而執法不渝其舅柴某酒醉毆殺羙人張氏為其父詣州訴寃師範為舅氏之故不以部民目之呼之為父冀其可厚賂和解勉諭重疉其父確然曰骨肉至寃唯在相公裁斷爾曰若必如是即國法予安敢亂之柴竟伏法其母恚之然亦不敢少責至今青州猶印賣王公判焉中朝盛時名重之賢指顧即能置人羽翼朱慶餘之赴舉也張水部一為其發卷于司文遂登第也光德相國崇望舉進士因朔望起居鄭太師從讜閽者已呈刺適遇裴侍郎後至先入從容公乃命屈劉秀才以入相國以主司在前不敢昇進坐隅拜于副階之上鄭公乃降而揖焉亟乃趨出鄭公佇立于階戺目之候其掩映門屏方囘歩言曰大好及第舉人裴公亦賛歎明年列於門生矣李節得道之士通三禮學甚精少工歐陽率更書自稱東山道士杖䇿孤邁居止無定所每歴諸子之家才止㕔事少時遂去児妻泣留蔑之顧也率多游于市井間縱飲酒肆稍稍于肋脅後取碎黄白物鬻換酒價資鏹時竭即不知所在人皆竊伺踪跡莫之得也或浹旬又見􅆵里中少年之徒多從而學書必愜意者方許之教常于衢路間忽見士人節謂之曰速將二千錢來二十日内教你歐書取成人敬從之果無謬矣得錢随手與人又善射法兖州節度使王庻人聞之迎而就試焉節曰當于隙所置一物但略言節可中也王公乃以常所使小僕于毬塲内以箬籠覆之謂節曰西望射之可中矣節曰不識此奴可射乎王公笑而許之未深信既一發箭使往覘之奴已貫心而斃矣王公大驚惋無及欲從之學節曰不可公今日得明即反矣王内惡之而不敢言既而命同出獵節遂亡歸山東忽一旦遍詣知聞吿别翌日而卒葬于城南平地累石為槨累年有獵者兎鷹随走入于墓穴間獵者窺之見其衣冠儼然而寢即戲之曰三禮健否以草杖掀之乃空衣焉方驗其尸解矣朱冲和五經及第恃其强敏好干忤人所在伺察瑕隙生情爭訟自江南採巨木送于台省卒不能運繫縶既久則又鹵莽捨之如此數四人號為宦途惡少黄巢本王仙芝賊中判官仙芝既死賊衆戴之為首遂日盛横行中原竟陷京洛數年方滅金華子曰民猶水也水能載舟亦能覆舟民于君也善則歸服惡則離貳始盜賊聚于曹濮皆承平之蒸民也官吏刻剥于賦斂水旱不恤其病餒父母妻子求養無計初則窺奪穀粟以救死命黨與既成則連衡同惡跨山壓海東逾梁宋南窮高廣列嶽無城壁之險重關踈百二之固蟒喙嘘天翠華狼狽而西幸豺牙爍日齊民肝腦以塗地酆鎬陵夷往而不返矣世之清平也搢紳之士率多矜持儒雅高心世禄靡念文武之本羣尚輕薄之風涖官行法何嘗及治由是大綱不維小漏㤀補失民有素上下相蒙百六之運既遭飜飛之變是作愚家自京洛淪陷遂河海播遷此流寓江南之所自也劉鄩本事販鬻王氏既承昭皇密詔㑹諸道將伐朱氏乃遣鄩偷取兖州鄩乃詐為囘圖軍將于兖州置邸院日顧傭夫數百詣青州潜遣健卒偽白衣逐晨就役夜即留匿于密室如是數月間得敢死之士千餘人又於大竹内蔵兵仗入監門皆不留意既而迎曉突入州據其甲仗庫時兖州節度使姓張統師伐河北鄩既入據子城甲兵精銳城内人皆束手莫敢旅拒加以州將素無恩信于衆鄩諭以將為順舉戢御嚴明雞犬無撓軍庻恱伏青州益師又至兼招誘武勇不日衆逾數萬張氏家屬在州供備逾于其舊張帥有母鄩每端簡候問備晨昏之敬加以容止重厚見者畏而敬之俄而張帥聞變回師圍城張母登陴呼其子而語之曰吾今雖在城内與汝隔絶而劉司空晨夕端笏問我起居其餘鷰雀莫敢諠雜汝切宜不可無禮于他由是張帥緩攻青州聽命于梁圍解鄩乃降梁梁太祖得鄩大喜累用征伐皆獲殊勲平魏府後遂為梁氏元帥威名顯于北朝矣咸通中有司天厯生姓胡在監三十年請老還江南後叙優勞授官江南郡之掾曹辭不赴任歸隱建業舊里有寓居盧符寳者亦名士也嘗問之曰近年以來相坐多不滿四人非三台星有災乎曰非三台也紫微星受災乎曰此十餘年内數或可備茍或有之即其家不免大禍後路公巖于公琮王公鐸韋公保衡楊公收劉公鄴盧公攜相次登于台坐其後皆不免惟于公琮頼長公主保䕶獲全於譴中耳盧公擕入相三日堂判福建觀察使播等九人上官之時衆詞疑惑王回崔程郎㓜復等三人到任之後政事乖張並勒停見任天下為之岌嶪黃巢勢盛遣使乞鄆州節度勑下許之擕謂妖亂之徒若許則僥倖得志及潼關不守鑾駕將西幸為小黃門數十人詣宅擁門詬責之遂寘堇而斃黃巢既入京斲其棺焉鄭傪為江淮留後金帛山疉而性鄙嗇每朝炊報熟即納于庫逐時量給緘鏁嚴密忽一日早辰其妻少弟至妝閣問其姊起居姊方治妝未畢家人備夫人晨饌于側姊顧謂其弟曰我未及餐爾可且㸃心止于水飯數匙復備夫人㸃心傪詬曰適已給了何得又請告以某舅餐却傪不得已付之曰怎麽人家夫人娘子喫得如許多飯食朱冲和常游杭州臨安監吏有姓朱者兄呼冲和頗邀迎止宿情好甚厚冲和深感之來監中訪同姓因出入隣司稍熟亦不防備一日隣房吏偶以私厯一道置在案間冲和窺之皆盜分官錢約數千百萬候其他適遂取之懐袖而去吏人既失此厯知為冲和所制一監之人無不罹重辟矣衆情危懼共請主人願以白金千笏贖之冲和既聞念茍不許之則宗人亦當不免乃曰若他人故難以久受弟之殊分則無不可也衆人常諳其禀性剛執儻一問不允則無復可以揺動初令往探若卜大敵及聞其許成咸私制賀五百兩銀不時齊足冲和既見乃取銀并厯同封以還之并續絶句三千里内布干戈累得鯨鯢入網羅今日寳刀無殺氣只縁君處受恩多然終以惡名為人所搆竟不免焉以恩地為恩府始于唐馬戴戴大中初為掌書記于太原李司空幕以正言被斥貶朗州龍陽尉戴著書自痛不得盡忠于恩府而動天下之浮議許棠常言于人曰往者年漸衰暮行倦逹官門下身疲且重上馬極難自喜一第以來筋骨輕健􅄃轡升降猶愈于少年時則知一名能療身心之疾其人世孤進之還丹也苗紳貶南中崔相國彥昭其故人也見而憫焉呼紳至第而慰勉曰苗十大是屈人再三言之紳歎久淹屈既聞時宰之撫諭莫勝其喜及還家其子迎于門紳笑語其子曰今日見崔相國憫我如此遂坐于㕔高誦其言曰苗十大是屈人喜笑一聲而卒悲夫顧况著作集中云山中樵人時見長松之上懸挂巨鐘再尋其鐘杳無蹊徑其所在即貴溪弋陽封疆之間愚宰上饒日有玉山縣民秀頻來說本邑懐玉山内樵蘇人往往見之長松森羅泉石幽麗前望若有宫苑林𣗳掩映松門之上有巨藤横亘挂大鐘可長丈餘去地又若十丈有採樵人矚目望於下徘徊竟日將去即密記道路逺近明日與親識同往則莫知所在時樵採則忽遇之又非向時所在鐘與松門則無異狀云旬月前鄰舍之人見之不誑也由是知逋公之記不謬哉常有新安人說本邑深山中有一水居人食此水者率皆長壽儘有二百歲者鄉人名為仙源或疑有靈草花木常堕水中使之然也亦不知是神仙浸濯芝术泉流連綿不逺乎餘功及物猶能鎮駐也是知名山巨岳無不聞有靈異之境信州靈山雖不齒于岳鎮盛名中而古仙勝跡亦甚可數其狀秀拔諸峰矗列亦有水源居人多長壽縣之人吏時有父母年過百歲􅁂髪不衰者沂密間有一僧常行井􅆵間舉止無定如狂如風邸店之家或有愛惜寶貨若來就覔即與之雖是貴物亦不敢拒旦若舍之暮必獲百倍之利由是人多畏敬無不迎之往往直入人家云貧道愛喫脂蔥雜麵􅀈飥速便煮來人家見之莫不延接及方就食將半忽捨起而四顧忽見糞土或乾驢糞即手捧投于椀内自摑其口言曰更敢貪食羙食否則盡食而去然所歴之處必尋有異事其後河水暴溢州城沈者數版州人恐懼皆登陴危坐立于城上水益漲頃刻去女牆頭數寸城人號哭數十萬衆命在斯須此僧忽大呼而來曰可惜了一城人命須與救取於是自城上投身洪波中軀質以沈巨浪随陷五尺及日晩城壁皆露明旦大水並涸州人感僧之力共追痛相率出城沿流涕泣而尋其尸忽于城西河水中小洲之上見其端然而坐方袍儼然大衆懽呼云和尚在就問則已溺死矣乃以輦轝舁起赴近岸數百之衆莫可舉動又其洲上游泥不可起塔廟相顧計議未决經宿其塗泥湧高數尺地變黄土堅若山阜就建巨塔至今在焉曹拮休莫詳其州里有妻孥居扁舟中來往宣池金陵每于山中兩錢價買柴赴江下一錢價賣與人自云喫利不盡善符鄉野牛瘴即以片紙書云曹拮休揀殘牛與牛主令歸貼于牛羣之大者角上無不立愈性嗜鱠持網者擕鱠以候之既見即問其來意漁人曰業網于圌山每歲夏先得鰣魚一頭獻于府主例獲一千文今冀早獲取賞故來相投受而許之以符一道付之適去未久復有一人亦擕鱠來告如前沈吟久之復授一符令去既而先得符者果得鰣魚遂奔赴府主至㕔門忽遇賓客遲回未將上次其後得符亦賫一頭來到乃同將上皆獲一緡焉此人靈異甚多已見于沈汾侍御所著續仙傳遺落數件故復叙之也咸通中金陵秦淮中有小民棹扁舟業以淘河者偶獲一古鏡可徑七八寸方拂拭則清明瑩徹皎潔鑑人心腑洞然見者大驚悸遂連棹出江口以鏡投于大江中既投而後悔之方訴于人聞者皆知是軒轅所鑄之一矣吾聞希世神物咸寶蔵于天府川瀆之靈密司其職歸蔵氏所傳固陰祗之多䕶何乃忽奮發于泥滓間而又不得令識者一覩豈上古之至寶時亦示顯晦于人哉而隐見有數俾特出愚者之手必其無能滯留于凡目耶楊琢常說在淄青日見一百姓家燕巢累年添接竟踰三尺其燕哺雛既飛一旦有諸野禽飛集俄而漸衆梁棟之上棲息無空隙不復畏人厨人饋食于堂俄手中盤饌皆被衆禽搏撮莫可驅趕其家老人罔測災祥顧之甚悶忽以杖擊破燕巢随手有白鳯雛長數尺自巢而墮未及於地即掀然飛去又有人家燕巢生一赤鳳子騰躍飛去志怪篇曰凡蔵諸寶亡不知處者以銅盤盛井華水赴所失處掘地照之見人影者物在下也楊琢云北海縣中門前有一處地形㣲高若小堆阜隐起如是積有歲華人莫敢鏟鑿有一縣宰乃特令平之既去數尺土即得小鐵錢散實其下如是漸廣衆力運取僅深尺餘東西延袤西面際乃得一記云此是海眼故鑄錢以鎮壓之量其數不可勝計又不明叙時代其錢大小如五銖闔縣畏慄慮致災變乃備祭酹却以所取錢皆塡築如故其後亦無他祥楊琢云有一人家燕巢中忽然赤焰光芒而隱隱有聲若鳴鼓地中日夜不輟夜後廂廵呵喝于外望之則又光焰亘天居旬日聞人漸聲傳曰或聚衆其家父老懼偶以拄杖探燕巢中即有一小龍長尺餘墜下鱗甲炳煥父老驚懼速以裀褥藉之焚香禱謝未畢既而見一大龍長丈餘自簷廡而入如炬爍人瞻視一家駭震竄伏稽顙徐擁其子入自寢室穴其屋騰天而去其家不數年隳敗焉楊琢云膠東屬郡有隱士莫詳其姓氏鄉里布袍單衣行乞于酒市中曰希一大醉而已既醺酣即以手握衫袖霞舉掉臂而行曰吉留馨吉留馨市中羣兒随繞噪擁一城之人咸謂之吉留馨秀才城西有古傳舍郡非衝要使命稀到常寄宿于驛廊土榻之上葦簟一重每醉而歸先以冷水連洗令濕透然後就枕寒暑有變兹固無改也雖霜風如割單枲之服覆身人往候之熱氣傍蒸于人驛之門者皆識其非常人每酤酒數升置于牀前及常為汲水沃簟以候其入見酒即飲罄而後寢經歴累年忽一旦往道齋大㑹中白日上昇矣僧守亮受業上元古瓦官寺學行無所聞而好言周易中彖𧰼賛皇李公之鎭浙右以南朝衆寺方袍且多其中必有人妙通易道者因帖下諸寺令擇一人送至府中瓦官綱首見亮因戲謂之曰大夫欲得解易僧吾師常時愛說易可能去否亮聞之遂請行既至賛皇初見儀容村野未之加敬及與論易道亮乃分條析理出没幽􅄨凡欲質疑亮乃敷衍出人意表長安閭里中小児常以纎草刺地穴間共邀勝負戲以手撫地曰顛當出來既見草動則釣出赤色小虫子形似蜘蛛北人見之尋常固不屆意南人偶見因有異之者蓋江南小児亦謂之釣駱駞其虫子之背有若駞峰然也搢紳㑹同時有此質疑衆皆默然客有前明經劉寡辭曰此爾雅所謂王蚨蜴也景純之注可校焉證之于書皆信衆皆歎伏金華子雜編巻下
