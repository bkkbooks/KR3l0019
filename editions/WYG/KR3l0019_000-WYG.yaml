body:
  text: 金華子雜編序金華子者河南劉生少慕赤松子兄弟能釋羇鞅於放牧間讀其書想其人恍若逰于金華之境因自號焉生自童蒙嵗便解愛人博學暨乎􅁂髪焦秃而無所成名凡為文章略知宗㫖最嗜吟詠而所得亦不出流軰年逾壮室方莅官于畿甸繼宰二邑共換二十餘寒暑唯知趦趄畏慎不􅀎磊落經濟罷秩歸京得留綴班家貧窶在闕三四年甚窘困稍暇猶綴吟不困倦縱情任興一聨一句亦時有合于清奇顧于食玉燃桂不無撓懐纔緩紆斯須則嘯傲自若或遇盛友良㑹聞人語話及興亾理亂猶耳聰意悦未嘗不周旋觀察冀或湊㑹警戒庻㡬助于理道者必慷慨反覆至于逾晷不息時皇上憂勤大寳宵衣旰食致治之切無愧前代命有司張皇公道掄擇材雋科第取士鬱然反古時有以春闈策問舉子對義見示者覩强國富民之論今古得失之理則愧惕雀息往往汗流何者以坐遇明盛時而抱名稱不聞于世何疾復甚于斯矣因念為童時侍立長者左右或于冬宵漏永秋階月瑩尊年省睡率皆話舊時經由多至深夜不寐始則承平事寔爰及亂離于故基跡或歎或泣悽咽僕𨽻自念髫齓之後甚􅀎記聽今雖稚齒變老耄㤀失憶十可一二猶存乎心耳併成人逰宦之後其間耳目諳詳公私變易知聞𫝊載可繫鈆槧者漸恐年代浸逺知者已踈更慮積新沉故遺絶堪惜宜編序者即随而釋之云爾文林郎大理司直臣劉崇逺撰
